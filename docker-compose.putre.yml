# ─────────────────────────────────────────────────────────────────────────────
# docker-compose.putre.yml - Instancia Putre
#
# Uso:
#   docker compose -f docker-compose.putre.yml up --build -d
# ─────────────────────────────────────────────────────────────────────────────
version: '3.8'

services:
  bot-putre:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PERSONALITY: putre
        ACTIVE_ROLES: pedir_oro,buscar_anillo
    image: roleagentbot:putre
    container_name: roleagentbot-putre

    # Variables de entorno
    env_file:
      - .env
    environment:
      - PERSONALITY=putre
      - ACTIVE_ROLES=pedir_oro,buscar_anillo

    # Volúmenes específicos para Putre
    volumes:
      - ./databases-putre:/app/databases
      - ./logs-putre:/app/logs

    restart: unless-stopped

    # Logging compacto
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
