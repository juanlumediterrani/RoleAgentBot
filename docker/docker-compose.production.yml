# ─────────────────────────────────────────────────────────────────────────────
# docker-compose.production.yml - Configuración de producción optimizada
#
# Características:
# - 2 bots con personalidades diferentes (Kronk y Putre)
# - Librerías Python compartidas (ahorro de recursos)
# - Todos los roles activos en ambos contenedores
# - Volúmenes compartidos para persistencia
#
# Uso:
#   docker compose -f docker-compose.production.yml up --build -d
# ─────────────────────────────────────────────────────────────────────────────
services:
  # Bot 1: Kronk - Todos los roles activos
  bot-kronk:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        PERSONALITY: kronk
    image: roleagentbot:kronk
    container_name: roleagentbot-kronk
    env_file: ../.env
    environment:
      - PERSONALITY=kronk
      - ROLE_AGENT_PROCESS=false
      - DISCORD_TOKEN=${DISCORD_TOKEN_KRONK}
      - ACTIVE_ROLES=news_watcher,treasure_hunter,trickster,banker,mc
      - NEWS_WATCHER_ENABLED=true
      - TREASURE_HUNTER_ENABLED=true
      - TRICKSTER_ENABLED=true
      - BANKER_ENABLED=true
      - MC_ENABLED=true
    volumes:
      - python-shared:/usr/local/lib/python3.13/site-packages
      - ../databases:/app/databases
      - ../logs:/app/logs
      - ../fatiga:/app/fatiga
    restart: unless-stopped

  # Bot 2: Putre - Todos los roles activos
  bot-putre:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        PERSONALITY: putre
    image: roleagentbot:putre
    container_name: roleagentbot-putre
    env_file: ../.env
    environment:
      - PERSONALITY=putre
      - ROLE_AGENT_PROCESS=false
      - DISCORD_TOKEN=${DISCORD_TOKEN_PUTRE}
      - ACTIVE_ROLES=news_watcher,treasure_hunter,trickster,banker,mc
      - NEWS_WATCHER_ENABLED=true
      - TREASURE_HUNTER_ENABLED=true
      - TRICKSTER_ENABLED=true
      - BANKER_ENABLED=true
      - MC_ENABLED=true
    volumes:
      - python-shared:/usr/local/lib/python3.13/site-packages
      - ../databases:/app/databases
      - ../logs:/app/logs
      - ../fatiga:/app/fatiga
    restart: unless-stopped

# Volumen compartido para Python (ahorro de recursos)
volumes:
  python-shared:
    driver: local
