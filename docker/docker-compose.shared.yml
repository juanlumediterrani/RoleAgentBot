# ─────────────────────────────────────────────────────────────────────────────
# docker-compose.shared.yml - Múltiples instancias compartiendo entorno Python
# 
# Este método comparte las librerías Python entre contenedores para ahorrar:
# - Memoria RAM: Las librerías se cargan una sola vez
# - Disco: Las librerías se almacenan una sola vez
# - Red: Las dependencias se descargan una sola vez
#
# Uso:
#   docker compose -f docker-compose.shared.yml up --build -d
# ─────────────────────────────────────────────────────────────────────────────
services:
  # Contenedor 1: Kronk (con vigia noticias y buscador de tesoros)
  bot-kronk:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        PERSONALITY: kronk
    image: roleagentbot:kronk
    container_name: roleagentbot-kronk
    env_file: ../.env
    environment:
      - PERSONALITY=kronk
      - ROLE_AGENT_PROCESS=false
      - DISCORD_TOKEN=${DISCORD_TOKEN_KRONK}
      # Roles activos para Kronk: vigia_noticias y buscador_tesoros
      - VIGIA_NOTICIAS_ENABLED=true
      - BUSCADOR_TESOROS_ENABLED=true
      - PEDIR_ORO_ENABLED=false
      - BUSCAR_ANILLO_ENABLED=false
    volumes:
      - python-shared:/usr/local/lib/python3.13/site-packages  # ← Compartir Python
      - ../databases:/app/databases
      - ../logs:/app/logs
      - ../fatiga.json:/app/fatiga.json
    restart: unless-stopped

  # Contenedor 2: Putre (con pedir oro y buscador de anillo)
  bot-putre:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        PERSONALITY: putre
    image: roleagentbot:putre
    container_name: roleagentbot-putre
    env_file: ../.env
    environment:
      - PERSONALITY=putre
      - ROLE_AGENT_PROCESS=false
      - DISCORD_TOKEN=${DISCORD_TOKEN_PUTRE}
      # Roles activos para Putre: pedir oro y buscar anillo
      - VIGIA_NOTICIAS_ENABLED=false
      - BUSCADOR_TESOROS_ENABLED=false
      - PEDIR_ORO_ENABLED=true
      - BUSCAR_ANILLO_ENABLED=true
    volumes:
      - python-shared:/usr/local/lib/python3.13/site-packages  # ← Compartir Python
      - ../databases:/app/databases
      - ../logs:/app/logs
      - ../fatiga.json:/app/fatiga.json
    restart: unless-stopped

# Volumen compartido para Python (ahorro máximo de recursos)
volumes:
  python-shared:
    driver: local
