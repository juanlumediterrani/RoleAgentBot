# ─────────────────────────────────────────────────────────────────────────────
# docker-compose.dev.yml - Configuración de desarrollo con todos los roles
#
# Características:
# - Bot único con TODOS los roles activados
# - Personalidad Kronk para desarrollo
# - Recursos limitados para desarrollo
# - Logging detallado para debugging
#
# Uso:
#   docker compose -f docker-compose.dev.yml up --build -d
# ─────────────────────────────────────────────────────────────────────────────
services:
  bot-dev:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        PERSONALITY: hans
        HOST_UID: ${HOST_UID:-1001}
        HOST_GID: ${HOST_GID:-1001}
    image: roleagentbot:dev
    container_name: roleagentbot-dev
    env_file: ../.env
    environment:
      - PERSONALITY=hans
      - ROLE_AGENT_PROCESS=false
    volumes:
      - ../databases:/app/databases
      - ../logs:/app/logs
      - ../fatiga:/app/fatiga
      - ../cookies.txt:/app/cookies.txt:ro  # YouTube cookies for authentication
    restart: "no"  # No reiniciar automáticamente en desarrollo
    
    # Logging detallado para depuración
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"
    
    # Limitar recursos en desarrollo
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
