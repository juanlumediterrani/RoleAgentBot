# ─────────────────────────────────────────────────────────────────────────────
# docker-compose.dev.yml - Configuración de desarrollo con todos los roles
#
# Características:
# - Bot único con TODOS los roles activados
# - Personalidad Kronk para desarrollo
# - Recursos limitados para desarrollo
# Development Bot - Hans con todos los roles
  bot-dev:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        ENABLE_MC: "true"
        PERSONALITY: hans
        HOST_UID: ${HOST_UID:-1001}
        HOST_GID: ${HOST_GID:-1001}
    image: roleagentbot:dev
    container_name: roleagentbot-dev
    env_file: ../.env
    environment:
      - PERSONALITY=hans
      - ROLE_AGENT_PROCESS=false
    volumes:
      - ../databases:/app/databases
      - ../logs:/app/logs
      - ../fatiga:/app/fatiga
      - ../cookies.txt:/app/cookies.txt
    restart: "no"  # Do not auto-restart in development
    
    # Detailed logging for debugging
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"
    
    # Limit resources in development
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
