# ─────────────────────────────────────────────────────────────────────────────
# docker-compose.default.yml - Instancia por defecto (usa agent_config.json tal cual)
#
# Uso:
#   docker compose -f docker-compose.default.yml up --build -d
# ─────────────────────────────────────────────────────────────────────────────
services:
  bot-default:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        PERSONALITY: putre(english)
    image: roleagentbot:default
    container_name: roleagentbot-default

    # Variables de entorno
    env_file: ../.env
    environment:
      - PERSONALITY=putre(english)
      - ROLE_AGENT_PROCESS=false

    # Volúmenes específicos para instancia default
    volumes:
      - ../databases:/app/databases
      - ../logs:/app/logs
      - ../fatiga:/app/fatiga
    restart: unless-stopped

    # Logging compacto
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
