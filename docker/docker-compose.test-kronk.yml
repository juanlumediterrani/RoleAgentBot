version: '3.8'

services:
  # Bot 1: Kronk con roles 1 y 2
  roleagentbot-kronk:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: roleagentbot:kronk
    container_name: roleagentbot-kronk
    environment:
      - ROLE_AGENT_ENV_FILE=/app/.env
      - PERSONALITY=kronk
      - ROLE_AGENT_PROCESS=false
      - DISCORD_TOKEN_KRONK=${DISCORD_TOKEN_KRONK}
      # Configurar roles 1 y 2 para kronk
      - VIGIA_NOTICIAS_ENABLED=true
      - BUSCADOR_TESOROS_ENABLED=true
      - PEDIR_ORO_ENABLED=false
      - BUSCAR_ANILLO_ENABLED=false
    env_file:
      - ../.env
    volumes:
      - ../databases:/app/databases
      - ../logs:/app/logs
      - ../fatiga.json:/app/fatiga.json
      - python-shared:/app/.local
    restart: unless-stopped
    networks:
      - roleagentbot-network

volumes:
  python-shared:

networks:
  roleagentbot-network:
    driver: bridge
