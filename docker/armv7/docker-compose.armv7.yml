# ─────────────────────────────────────────────────────────────────────────────
# docker-compose.armv7.yml - Configuración para Raspberry Pi 32 bits
# 
# Optimizado para despliegue en producción con personalidad PUTRE
#
# Uso:
#   export PERSONALITY=putre
#   docker compose -f docker-compose.armv7.yml up --build -d
# ─────────────────────────────────────────────────────────────────────────────
services:
  bot:
    platform: linux/arm/v7  # ← Forzar arquitectura ARM 32 bits
    build:
      context: ../..
      dockerfile: docker/armv7/Dockerfile.armv7
      args:
        PERSONALITY: ${PERSONALITY:-putre(english)}
        ACTIVE_ROLES: ${ACTIVE_ROLES:-news_watcher,treasure_hunter,trickster,banker,mc}
    image: roleagentbot:putre-armv7
    container_name: putrebot
    env_file: ../../.env
    environment:
      - PERSONALITY=${PERSONALITY:-putre(english)}
      - ACTIVE_ROLES=${ACTIVE_ROLES:-news_watcher,treasure_hunter,trickster,banker,mc}
      - ROLE_AGENT_PROCESS=false
    volumes:
      - ../../databases:/app/databases
      - ../../logs:/app/logs
      - ../../fatiga.json:/app/fatiga.json
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    healthcheck:
      test: ["CMD", "python", "-c", "import discord; print('OK')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
