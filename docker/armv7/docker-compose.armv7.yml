# ─────────────────────────────────────────────────────────────────────────────
# docker-compose.armv7.yml - Single bot para Raspberry Pi 32 bits
# 
# Configuración para un solo bot en arquitectura ARM 32 bits
#
# Uso:
#   docker compose -f docker-compose.armv7.yml up --build -d
# ─────────────────────────────────────────────────────────────────────────────
services:
  bot:
    platform: linux/arm/v7  # ← Forzar arquitectura ARM 32 bits
    build:
      context: ../..
      dockerfile: docker/armv7/Dockerfile.armv7
      args:
        PERSONALITY: ${PERSONALITY:-kronk}
    image: roleagentbot:armv7
    container_name: roleagentbot
    env_file: ../../.env
    environment:
      - PERSONALITY=${PERSONALITY:-kronk}
      - ROLE_AGENT_PROCESS=false
      - DISCORD_TOKEN=${DISCORD_TOKEN}
      # Sin variables de rol específicas -> usa agent_config.json
    volumes:
      - ../../databases:/app/databases
      - ../../logs:/app/logs
      - ../../fatiga.json:/app/fatiga.json
    restart: unless-stopped
