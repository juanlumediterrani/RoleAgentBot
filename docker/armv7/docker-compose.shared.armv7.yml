# ─────────────────────────────────────────────────────────────────────────────
# docker-compose.shared.armv7.yml - Múltiples instancias para Raspberry Pi 32 bits
# 
# Este método comparte las librerías Python entre contenedores para ahorrar:
# - Memoria RAM: Las librerías se cargan una sola vez
# - Disco: Las librerías se almacenan una sola vez
# - Red: Las dependencias se descargan una sola vez
#
# Uso:
#   docker compose -f docker-compose.shared.armv7.yml up --build -d
# ─────────────────────────────────────────────────────────────────────────────
services:
  # Contenedor 1: Kronk (con vigia noticias y buscador de tesoros)
  bot-kronk:
    platform: linux/arm/v7  # ← Forzar arquitectura ARM 32 bits
    build:
      context: ../..
      dockerfile: docker/armv7/Dockerfile.armv7  # ← Usar Dockerfile para ARMv7
      args:
        PERSONALITY: kronk
    image: roleagentbot:kronk-armv7
    container_name: roleagentbot-kronk
    env_file: ../../.env
    environment:
      - PERSONALITY=kronk
      - ROLE_AGENT_PROCESS=false
      - DISCORD_TOKEN=${DISCORD_TOKEN_KRONK}
      # Roles activos para Kronk: news_watcher y treasure_hunter
      - NEWS_WATCHER_ENABLED=false
      - TREASURE_HUNTER_ENABLED=true
      - TRICKSTER_ENABLED=true
      - BANKER_ENABLED=false
    volumes:
      - python-shared-armv7:/usr/local/lib/python3.13/site-packages  # ← Compartir Python
      - ../../databases:/app/databases
      - ../../logs:/app/logs
      - ../../fatiga.json:/app/fatiga.json
    restart: unless-stopped

  # Contenedor 2: Putre (con pedir oro y buscador de anillo)
  bot-putre:
    platform: linux/arm/v7  # ← Forzar arquitectura ARM 32 bits
    build:
      context: ../..
      dockerfile: docker/armv7/Dockerfile.armv7  # ← Usar Dockerfile para ARMv7
      args:
        PERSONALITY: putre
    image: roleagentbot:putre-armv7
    container_name: roleagentbot-putre
    env_file: ../../.env
    environment:
      - PERSONALITY=putre
      - ROLE_AGENT_PROCESS=false
      - DISCORD_TOKEN=${DISCORD_TOKEN_PUTRE}
      # Roles activos para Putre: trickster (ring) y news_watcher
      - NEWS_WATCHER_ENABLED=true
      - TREASURE_HUNTER_ENABLED=false
      - TRICKSTER_ENABLED=false
      - BANKER_ENABLED=true
    volumes:
      - python-shared-armv7:/usr/local/lib/python3.13/site-packages  # ← Compartir Python
      - ../../databases:/app/databases
      - ../../logs:/app/logs
      - ../../fatiga.json:/app/fatiga.json
    restart: unless-stopped

# Volumen compartido para Python (ahorro máximo de recursos)
volumes:
  python-shared-armv7:
    driver: local
