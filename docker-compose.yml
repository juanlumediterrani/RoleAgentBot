# ─────────────────────────────────────────────────────────────────────────────
# docker-compose.yml
#
# Uso rápido:
#   docker compose up --build
#
# Para elegir personalidad y roles sin recompilar la imagen base:
#   PERSONALITY=kronk ACTIVE_ROLES=vigia_noticias,buscar_anillo \
#     docker compose up --build
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Imagen base (solo instala dependencias pip) ─────────────────────────────
  # No es un servicio que se ejecuta; se usa exclusivamente como etapa de build.
  # Se construye con:  docker build -f Dockerfile.base -t roleagentbot-base:latest .
  # El servicio 'bot' depende de que esa imagen ya exista.

  bot:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PERSONALITY: ${PERSONALITY:-}
        ACTIVE_ROLES: ${ACTIVE_ROLES:-}
    image: roleagentbot:latest
    container_name: roleagentbot

    # Variables de entorno en tiempo de ejecución.
    # Carga el .env del host pero NO lo mete en la imagen.
    env_file:
      - .env
    environment:
      - PERSONALITY=${PERSONALITY:-}
      - ACTIVE_ROLES=${ACTIVE_ROLES:-}

    # Estado persistente: bases de datos y logs viven fuera del contenedor.
    volumes:
      - ./databases:/app/databases
      - ./logs:/app/logs

    restart: unless-stopped

    # Logging compacto para no saturar el demonio de Docker
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
