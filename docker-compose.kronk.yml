# ─────────────────────────────────────────────────────────────────────────────
# docker-compose.kronk.yml - Instancia Kronk
#
# Uso:
#   docker compose -f docker-compose.kronk.yml up --build -d
# ─────────────────────────────────────────────────────────────────────────────
version: '3.8'

services:
  bot-kronk:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PERSONALITY: kronk
        ACTIVE_ROLES: vigia_noticias,buscar_anillo
    image: roleagentbot:kronk
    container_name: roleagentbot-kronk

    # Variables de entorno
    env_file:
      - .env
    environment:
      - PERSONALITY=kronk
      - ACTIVE_ROLES=vigia_noticias,buscar_anillo

    # Volúmenes específicos para Kronk
    volumes:
      - ./databases-kronk:/app/databases
      - ./logs-kronk:/app/logs

    restart: unless-stopped

    # Logging compacto
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
